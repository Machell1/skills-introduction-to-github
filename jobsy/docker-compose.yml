version: "3.8"

services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: jobsy
      POSTGRES_USER: jobsy
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobsy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: local-dev-secret-change-in-production
      PROFILES_SERVICE_URL: http://profiles:8000
      LISTINGS_SERVICE_URL: http://listings:8000
      SWIPES_SERVICE_URL: http://swipes:8000
      MATCHES_SERVICE_URL: http://matches:8000
      GEOSHARD_SERVICE_URL: http://geoshard:8000
      RECOMMENDATIONS_SERVICE_URL: http://recommendations:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  profiles:
    build:
      context: .
      dockerfile: profiles/Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  listings:
    build:
      context: .
      dockerfile: listings/Dockerfile
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  swipes:
    build:
      context: .
      dockerfile: swipes/Dockerfile
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  matches:
    build:
      context: .
      dockerfile: matches/Dockerfile
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  geoshard:
    build:
      context: .
      dockerfile: geoshard/Dockerfile
    ports:
      - "8005:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  recommendations:
    build:
      context: .
      dockerfile: recommendations/Dockerfile
    ports:
      - "8006:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      GEOSHARD_SERVICE_URL: http://geoshard:8000
      LISTINGS_SERVICE_URL: http://listings:8000
      PROFILES_SERVICE_URL: http://profiles:8000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
