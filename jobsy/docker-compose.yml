version: "3.8"

services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: jobsy
      POSTGRES_USER: jobsy
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobsy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: local-dev-secret-change-in-production
      PROFILES_SERVICE_URL: http://profiles:8000
      LISTINGS_SERVICE_URL: http://listings:8000
      SWIPES_SERVICE_URL: http://swipes:8000
      MATCHES_SERVICE_URL: http://matches:8000
      GEOSHARD_SERVICE_URL: http://geoshard:8000
      RECOMMENDATIONS_SERVICE_URL: http://recommendations:8000
      CHAT_SERVICE_URL: http://chat:8000
      NOTIFICATIONS_SERVICE_URL: http://notifications:8000
      STORAGE_SERVICE_URL: http://storage:8000
      ADVERTISING_SERVICE_URL: http://advertising:8000
      PAYMENTS_SERVICE_URL: http://payments:8000
      REVIEWS_SERVICE_URL: http://reviews:8000
      SEARCH_SERVICE_URL: http://search:8000
      ADMIN_SERVICE_URL: http://admin:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  profiles:
    build:
      context: .
      dockerfile: profiles/Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  listings:
    build:
      context: .
      dockerfile: listings/Dockerfile
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  swipes:
    build:
      context: .
      dockerfile: swipes/Dockerfile
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  matches:
    build:
      context: .
      dockerfile: matches/Dockerfile
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  geoshard:
    build:
      context: .
      dockerfile: geoshard/Dockerfile
    ports:
      - "8005:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  recommendations:
    build:
      context: .
      dockerfile: recommendations/Dockerfile
    ports:
      - "8006:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      GEOSHARD_SERVICE_URL: http://geoshard:8000
      LISTINGS_SERVICE_URL: http://listings:8000
      PROFILES_SERVICE_URL: http://profiles:8000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat:
    build:
      context: .
      dockerfile: chat/Dockerfile
    ports:
      - "8007:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notifications:
    build:
      context: .
      dockerfile: notifications/Dockerfile
    ports:
      - "8008:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  storage:
    build:
      context: .
      dockerfile: storage/Dockerfile
    ports:
      - "8009:8000"
    environment:
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: jobsy
      S3_PUBLIC_URL: http://localhost:9000/jobsy
    depends_on:
      minio:
        condition: service_healthy

  advertising:
    build:
      context: .
      dockerfile: advertising/Dockerfile
    ports:
      - "8010:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
    depends_on:
      postgres:
        condition: service_healthy

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - esdata:/var/lib/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  payments:
    build:
      context: .
      dockerfile: payments/Dockerfile
    ports:
      - "8011:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  reviews:
    build:
      context: .
      dockerfile: reviews/Dockerfile
    ports:
      - "8012:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  search:
    build:
      context: .
      dockerfile: search/Dockerfile
    ports:
      - "8013:8000"
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    ports:
      - "8014:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobsy:localdev@postgres:5432/jobsy
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
  esdata:
