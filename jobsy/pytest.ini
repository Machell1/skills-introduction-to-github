[pytest]
asyncio_mode = auto
testpaths =
    gateway/tests
    profiles/tests
    listings/tests
    swipes/tests
    matches/tests
    chat/tests
    notifications/tests
    payments/tests
    reviews/tests
    search/tests
    admin/tests
markers =
    integration: marks tests requiring external services (postgres, redis, rabbitmq)
    slow: marks tests that take more than 5 seconds
filterwarnings =
    ignore::DeprecationWarning
