;+------------------------------------------------------------------+
;| CLAWBOT - MT5 Strategy Tester Configuration                      |
;| Auto-generated by CLAWBOT launcher - DO NOT EDIT MANUALLY        |
;+------------------------------------------------------------------+
;
; This file is used to run automated backtesting via MT5 CLI.
; Placeholders (wrapped in {braces}) are filled at runtime.
;

[Common]
; Login credentials (optional for backtest on demo)
Login={login}
Password={password}
Server={server}

[Tester]
; EA to test
Expert=CLAWBOT\CLAWBOT

; Symbol and timeframe
Symbol={symbol}
Period={period}

; Modeling mode: 0=Every tick, 1=1 minute OHLC, 2=Open price only
Model=1

; Optimization: 0=Disabled, 1=Slow complete, 2=Genetic, 3=All symbols
Optimization=0

; Date range for testing
FromDate={from_date}
ToDate={to_date}

; Forward testing: 0=No, 1=Half, 2=Third, 3=Quarter, 4=Custom
ForwardMode=0

; Starting deposit and currency
Deposit={deposit}
Currency=USD

; Leverage
Leverage=1:{leverage}

; Report settings
Report=CLAWBOT_Reports\CLAWBOT_Backtest
ReplaceReport=1

; Execution mode for testing
ExecutionMode=0

; Shut down terminal after test completes (critical for automation)
ShutdownTerminal=1

; Visual mode: 0=disabled (faster), 1=enabled
Visual=0

; Profit mode: 0=in money, 1=in pips
ProfitInPips=0
