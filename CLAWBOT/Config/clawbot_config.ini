;+------------------------------------------------------------------+
;|                                          clawbot_config.ini       |
;|                    CLAWBOT Configuration File                     |
;|                         For XAUUSD H1 on Deriv MT5               |
;+------------------------------------------------------------------+
;
; This file contains the default configuration for CLAWBOT.
; Edit these values to customize bot behavior.
; Note: EA input parameters in MT5 take precedence over this file.
;
; Adapted for: $100 MICRO ACCOUNT
; Key constraints: 0.01 min lot = fixed $1-3 risk per trade,
;                  1 concurrent trade max, 3 trades/day max,
;                  partial close disabled (can't split 0.01 lot),
;                  max SL capped at 300pts for capital protection

[General]
Symbol=XAUUSD
Timeframe=H1
MagicNumber=20240101
BotMode=Backtest
; Set BotMode=Live after successful backtesting and credential setup

[RiskManagement]
RiskPerTrade=2.0
MaxDailyLoss=6.0
MaxTotalDrawdown=25.0
MaxConcurrentTrades=1
MaxDailyTrades=3
MinRiskReward=1.5

[StopLoss_TakeProfit]
SL_ATR_Multiplier=0.5
TP_ATR_Multiplier=2.0
MinSL_Points=100
MaxSL_Points=400
TrailingActivation_ATR=1.8
TrailingDistance_ATR=0.8
; Breakeven activates at 50% of TrailingActivation (0.9 ATR)

[Strategy_Trend]
Enabled=true
EMA_Fast=8
EMA_Signal=21
EMA_Trend=50
EMA_Major=200
ADX_Period=14
ADX_Threshold=25.0
CrossoverLookback=5

[Strategy_Momentum]
Enabled=true
RSI_Period=14
RSI_Oversold=30.0
RSI_Overbought=75.0
MACD_Fast=12
MACD_Slow=26
MACD_Signal=9
Stoch_K=14
Stoch_D=3
Stoch_Slowing=3

[Strategy_Session]
Enabled=true
AsianStartHour=0
AsianEndHour=7
LondonStartHour=7
LondonEndHour=16
ExitHour=21

[Strategy_MeanRevert]
Enabled=true
BB_Period=20
BB_Deviation=2.0
BB_TouchBuffer=0.2

[MTF_Filter]
Enabled=false
Timeframe=H4

[PendingOrders]
UsePendingOrders=true
ExpiryBars=4
PullbackATR=0.3

[DynamicClosure]
Enabled=true
MaxLossATR=0.6
StaleBars=10
StaleRange=0.2
AdverseMomentumATR=0.15

[DynamicTP]
Enabled=true
TrendMultiplier=2.5
RangeMultiplier=0.8

[ProfitLocking]
; Partial close DISABLED on micro account (0.01 lot cannot be split)
EnablePartialClose=false
TP1_ATR=1.2
PartialClosePct=0.15

[Strategy_SMC]
Enabled=false
SwingStrength=3
ImpulseATR_Multiplier=2.5
OBMaxAge=72
FVGMinSize=2.0
FVGMaxSize=15.0
SweepATR_Multiplier=1.5
RoundNumberInterval=50.0

[Brain]
Enabled=true
ADXTrendThreshold=20.0
ADXStrongThreshold=30.0
ATRHighRatio=1.5
ATRLowRatio=0.8

[Confluence]
MinScore=45
MinStrategiesAgreeing=2
MinStrategyScore=30
CooldownAfterLosses=2
CooldownBars=6

[Audit]
WinRateThreshold=55.0
ReportPath=CLAWBOT_Reports

[Deriv]
; Deriv-specific settings
; Deriv MT5 servers:
;   Demo:  Deriv-Demo
;   Live:  Deriv-Server or Deriv-Server-02
;
; Symbol naming on Deriv may vary:
;   Standard: XAUUSD
;   Micro:    XAUUSDm
;
; Check your Deriv account type for correct symbol
DefaultServer=Deriv-Server
AccountType=Standard
