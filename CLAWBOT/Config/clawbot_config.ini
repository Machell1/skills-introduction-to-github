;+------------------------------------------------------------------+
;|                                          clawbot_config.ini       |
;|                    CLAWBOT Configuration File                     |
;|                         For XAUUSD H1 on Deriv MT5               |
;+------------------------------------------------------------------+
;
; This file contains the default configuration for CLAWBOT.
; Edit these values to customize bot behavior.
; Note: EA input parameters in MT5 take precedence over this file.
;
; DYNAMIC EQUITY SCALING - works with ANY account size ($50 to $100k+)
; The bot auto-detects account equity and adjusts:
;   risk%, max DD%, concurrent trades, daily trades, SL range,
;   partial close, and lot sizing
; Just set your initial_balance and the bot handles the rest.
;
; To change account size: edit initial_balance in optimal_config.json
; or pass balance as command line arg: python backtest_engine.py 5000

[General]
Symbol=XAUUSD
Timeframe=H1
MagicNumber=20240101
BotMode=Backtest
; Set BotMode=Live after successful backtesting and credential setup

[RiskManagement]
; These are BASE defaults - overridden by dynamic equity scaler at runtime
RiskPerTrade=2.0
MaxDailyLoss=5.0
MaxTotalDrawdown=20.0
MaxConcurrentTrades=3
MaxDailyTrades=5
MinRiskReward=0.0
; Set to 0 to allow TP closer than SL (high win-rate mode)
; Tight TP (0.3 ATR) gives 55%+ WR at cost of smaller wins

[StopLoss_TakeProfit]
SL_ATR_Multiplier=0.6
TP_ATR_Multiplier=0.3
MinSL_Points=150
MaxSL_Points=600
TrailingActivation_ATR=99.0
TrailingDistance_ATR=99.0
; Trailing disabled in high-WR mode (drops WR below target)

[Strategy_Trend]
Enabled=true
EMA_Fast=8
EMA_Signal=21
EMA_Trend=50
EMA_Major=200
ADX_Period=14
ADX_Threshold=25.0
CrossoverLookback=5

[Strategy_Momentum]
Enabled=true
RSI_Period=14
RSI_Oversold=30.0
RSI_Overbought=75.0
MACD_Fast=12
MACD_Slow=26
MACD_Signal=9
Stoch_K=14
Stoch_D=3
Stoch_Slowing=3

[Strategy_Session]
Enabled=true
AsianStartHour=0
AsianEndHour=7
LondonStartHour=7
LondonEndHour=16
ExitHour=21

[Strategy_MeanRevert]
Enabled=true
BB_Period=20
BB_Deviation=2.0
BB_TouchBuffer=0.2

[MTF_Filter]
Enabled=false
Timeframe=H4

[PendingOrders]
UsePendingOrders=true
ExpiryBars=4
PullbackATR=0.3

[DynamicClosure]
Enabled=true
MaxLossATR=0.4
StaleBars=8
StaleRange=0.15
AdverseMomentumATR=0.2

[DynamicTP]
Enabled=false
TrendMultiplier=2.5
RangeMultiplier=0.8

[ProfitLocking]
; Partial close auto-enabled/disabled by equity scaler based on lot size
EnablePartialClose=true
TP1_ATR=1.2
PartialClosePct=0.15

[Strategy_SMC]
Enabled=false
SwingStrength=3
ImpulseATR_Multiplier=2.5
OBMaxAge=72
FVGMinSize=2.0
FVGMaxSize=15.0
SweepATR_Multiplier=1.5
RoundNumberInterval=50.0

[Brain]
Enabled=true
ADXTrendThreshold=20.0
ADXStrongThreshold=30.0
ATRHighRatio=1.5
ATRLowRatio=0.8

[Confluence]
MinScore=30
MinStrategiesAgreeing=1
MinStrategyScore=25
CooldownAfterLosses=2
CooldownBars=6

[Audit]
WinRateThreshold=55.0
ReportPath=CLAWBOT_Reports

[Deriv]
; Deriv-specific settings
; Deriv MT5 servers:
;   Demo:  Deriv-Demo
;   Live:  Deriv-Server or Deriv-Server-02
;
; Symbol naming on Deriv may vary:
;   Standard: XAUUSD
;   Micro:    XAUUSDm
;
; Check your Deriv account type for correct symbol
DefaultServer=Deriv-Server
AccountType=Standard
