{% extends "base.html" %}
{% block title %}Log New Trip{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h4>
            <i class="bi bi-signpost-2 me-2" style="color: var(--fnid-navy);"></i>
            Log New Trip
        </h4>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="{{ url_for('main.home') }}">Portal</a></li>
                <li class="breadcrumb-item"><a href="{{ url_for('transport.fleet') }}">Transport</a></li>
                <li class="breadcrumb-item"><a href="{{ url_for('transport.trip_log') }}">Trip Log</a></li>
                <li class="breadcrumb-item active">New Trip</li>
            </ol>
        </nav>
    </div>
</div>

<form method="POST" action="{{ url_for('transport.new_trip') }}" class="needs-validation" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <!-- Vehicle & Driver -->
    <div class="form-section">
        <div class="form-section-title">
            <i class="bi bi-truck me-2"></i>Vehicle & Driver
        </div>
        <div class="row">
            <div class="col-md-4">
                <label for="vehicle_id" class="form-label">Vehicle <span class="required">*</span></label>
                <select class="form-select" id="vehicle_id" name="vehicle_id" required>
                    <option value="">-- Select Vehicle --</option>
                    {% for v in vehicles %}
                    <option value="{{ v.vehicle_id }}" data-mileage="{{ v.current_mileage or 0 }}">
                        {{ v.vehicle_id }} - {{ v.registration }} ({{ v.make }} {{ v.model }})
                        {% if v.status == 'In Use' %}[IN USE]{% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label for="driver_badge" class="form-label">Driver Badge No.</label>
                <input type="text" class="form-control" id="driver_badge" name="driver_badge"
                       placeholder="Badge number">
            </div>
            <div class="col-md-4">
                <label for="driver_name" class="form-label">Driver Name <span class="required">*</span></label>
                <input type="text" class="form-control" id="driver_name" name="driver_name"
                       placeholder="Full name of driver" required>
            </div>
        </div>
    </div>

    <!-- Trip Details -->
    <div class="form-section">
        <div class="form-section-title">
            <i class="bi bi-geo-alt me-2"></i>Trip Details
        </div>
        <div class="row">
            <div class="col-md-3">
                <label for="trip_date" class="form-label">Trip Date <span class="required">*</span></label>
                <input type="date" class="form-control" id="trip_date" name="trip_date" required>
            </div>
            <div class="col-md-3">
                <label for="departure_time" class="form-label">Departure Time</label>
                <input type="time" class="form-control" id="departure_time" name="departure_time">
            </div>
            <div class="col-md-3">
                <label for="departure_location" class="form-label">Departure Location <span class="required">*</span></label>
                <input type="text" class="form-control" id="departure_location" name="departure_location"
                       placeholder="e.g. FNID HQ Mandeville" required>
            </div>
            <div class="col-md-3">
                <label for="destination" class="form-label">Destination <span class="required">*</span></label>
                <input type="text" class="form-control" id="destination" name="destination"
                       placeholder="e.g. Black River Court" required>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-md-6">
                <label for="purpose" class="form-label">Purpose <span class="required">*</span></label>
                <input type="text" class="form-control" id="purpose" name="purpose"
                       placeholder="e.g. Witness interview, Court attendance, Operation" required>
            </div>
            <div class="col-md-3">
                <label for="start_mileage" class="form-label">Start Mileage (km) <span class="required">*</span></label>
                <input type="number" class="form-control" id="start_mileage" name="start_mileage"
                       placeholder="Odometer reading at departure" required min="0">
            </div>
            <div class="col-md-3">
                <label for="fuel_added_litres" class="form-label">Fuel Added (litres)</label>
                <input type="number" step="0.1" class="form-control" id="fuel_added_litres" name="fuel_added_litres"
                       placeholder="Fuel added before departure" min="0">
            </div>
        </div>
    </div>

    <!-- Linked Records -->
    <div class="form-section">
        <div class="form-section-title">
            <i class="bi bi-link-45deg me-2"></i>Linked Records (Optional)
        </div>
        <div class="row">
            <div class="col-md-6">
                <label for="linked_case_id" class="form-label">Linked Case ID</label>
                <input type="text" class="form-control" id="linked_case_id" name="linked_case_id"
                       placeholder="e.g. FNID-2026-00123">
            </div>
            <div class="col-md-6">
                <label for="linked_op_id" class="form-label">Linked Operation ID</label>
                <input type="text" class="form-control" id="linked_op_id" name="linked_op_id"
                       placeholder="e.g. OP-2026-00045">
            </div>
        </div>
    </div>

    <!-- Notes -->
    <div class="form-section">
        <div class="form-section-title">
            <i class="bi bi-chat-left-text me-2"></i>Notes
        </div>
        <div class="row">
            <div class="col-md-12">
                <textarea class="form-control" id="notes" name="notes" rows="3"
                          placeholder="Additional notes about this trip"></textarea>
            </div>
        </div>
    </div>

    <!-- Submit -->
    <div class="d-flex gap-2 mt-3 mb-4">
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-circle me-1"></i> Log Trip
        </button>
        <a href="{{ url_for('transport.trip_log') }}" class="btn btn-outline-secondary">
            <i class="bi bi-x-circle me-1"></i> Cancel
        </a>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Auto-fill start mileage from vehicle's current mileage
    var vehicleSelect = document.getElementById('vehicle_id');
    var startMileage = document.getElementById('start_mileage');

    if (vehicleSelect && startMileage) {
        vehicleSelect.addEventListener('change', function() {
            var selected = this.options[this.selectedIndex];
            var mileage = selected.getAttribute('data-mileage');
            if (mileage && mileage !== '0') {
                startMileage.value = mileage;
            }
        });
    }
});
</script>
{% endblock %}
