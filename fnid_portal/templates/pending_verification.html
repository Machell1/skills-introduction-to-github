<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNID Area 3 | Pending Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fnid.css') }}">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <i class="bi bi-hourglass-split"></i>
            <h2>Account Pending</h2>
            <p>Your account is being verified</p>
        </div>
        <div class="alert alert-warning">
            <i class="bi bi-clock-history me-2"></i>
            Your account was registered and is pending verification. This typically takes up to 12 hours, or an administrator can approve it sooner.
        </div>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-secondary">
                <i class="bi bi-box-arrow-left me-1"></i> Sign Out
            </a>
        </div>
        <div class="text-center mt-2">
            <small class="text-muted">Page will auto-refresh every 60 seconds.</small>
        </div>
    </div>
</div>
<script>setTimeout(function(){ location.reload(); }, 60000);</script>
</body>
</html>
