{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-header" style="background-color: #1F3864; color: #fff;">
                <h5 class="mb-0"><i class="bi bi-key me-2"></i>Change Password</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.change_password') }}" class="needs-validation" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="current_password" class="form-label">Current Password <span class="required">*</span></label>
                        <input type="password" class="form-control" id="current_password" name="current_password"
                               required placeholder="Enter your current password">
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">New Password <span class="required">*</span></label>
                        <input type="password" class="form-control" id="new_password" name="new_password"
                               required minlength="8" placeholder="Minimum 8 characters">
                        <div class="form-text">Password must be at least 8 characters long.</div>
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">Confirm New Password <span class="required">*</span></label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                               required minlength="8" placeholder="Re-enter new password">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary" style="background-color: #1F3864; border-color: #1F3864;">
                            <i class="bi bi-check-lg me-1"></i> Update Password
                        </button>
                        <a href="{{ url_for('main.home') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
