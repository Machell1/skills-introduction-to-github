<div class="row g-3">
    <div class="col-md-4">
        <label class="form-label">Seizure Date</label>
        <input type="date" class="form-control" name="seizure_date" value="{{ fields.get('seizure_date', '') }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Parish</label>
        <select class="form-select" name="parish">
            <option value="">-- Select --</option>
            {% for p in cfg.ALL_PARISHES %}
            <option value="{{ p }}" {{ 'selected' if p == fields.get('parish') }}>{{ p }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Seizure Location</label>
        <select class="form-select" name="location">
            <option value="">-- Select --</option>
            {% for l in cfg.SEIZURE_LOCATIONS %}
            <option value="{{ l }}" {{ 'selected' if l == fields.get('location') }}>{{ l }}</option>
            {% endfor %}
        </select>
    </div>
</div>
<div class="row g-3 mt-1">
    <div class="col-md-4">
        <label class="form-label">Drug Type</label>
        <select class="form-select" name="drug_type">
            <option value="">-- Select --</option>
            {% for t in cfg.DRUG_TYPES %}
            <option value="{{ t }}" {{ 'selected' if t == fields.get('drug_type') }}>{{ t }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-3">
        <label class="form-label">Quantity</label>
        <input type="number" class="form-control" name="quantity" value="{{ fields.get('quantity', '') }}" min="0" step="0.01">
    </div>
    <div class="col-md-2">
        <label class="form-label">Unit</label>
        <select class="form-select" name="unit">
            <option value="">--</option>
            {% for u in cfg.DRUG_UNITS %}
            <option value="{{ u }}" {{ 'selected' if u == fields.get('unit') }}>{{ u }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-3">
        <label class="form-label">Est. Street Value ($)</label>
        <input type="number" class="form-control" name="est_street_value" value="{{ fields.get('est_street_value', '') }}" min="0">
    </div>
</div>
<div class="row g-3 mt-1">
    <div class="col-md-4">
        <label class="form-label">Lab Certificate Status</label>
        <select class="form-select" name="lab_cert_status">
            <option value="">-- Select --</option>
            {% for s in cfg.FORENSIC_CERT_STATUS %}
            <option value="{{ s }}" {{ 'selected' if s == fields.get('lab_cert_status') }}>{{ s }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Packaging Method</label>
        <input type="text" class="form-control" name="packaging_method" value="{{ fields.get('packaging_method', '') }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Field Test Result</label>
        <input type="text" class="form-control" name="field_test_result" value="{{ fields.get('field_test_result', '') }}">
    </div>
</div>
