name: Jobsy CI

on:
  push:
    branches: [main, develop]
    paths: ['jobsy/**']
  pull_request:
    branches: [main]
    paths: ['jobsy/**']

defaults:
  run:
    working-directory: jobsy

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Run ruff linter
        run: ruff check .

      - name: Run ruff formatter check
        run: ruff format --check .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: jobsy_test
          POSTGRES_USER: jobsy
          POSTGRES_PASSWORD: testpass
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U jobsy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://jobsy:testpass@localhost:5432/jobsy_test
      REDIS_URL: redis://localhost:6379/0
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install shared library
        run: pip install -e shared/

      - name: Install test dependencies
        run: |
          pip install -r requirements-test.txt
          pip install -r gateway/requirements.txt
          pip install -r reviews/requirements.txt
          pip install -r payments/requirements.txt
          pip install -r admin/requirements.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: jobsy/coverage.xml

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service:
          - gateway
          - profiles
          - listings
          - swipes
          - matches
          - geoshard
          - recommendations
          - chat
          - notifications
          - storage
          - advertising
          - payments
          - reviews
          - search
          - admin
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }}
        run: |
          docker build -f ${{ matrix.service }}/Dockerfile -t jobsy-${{ matrix.service }}:${{ github.sha }} .

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy all services
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          for service in gateway profiles listings swipes matches geoshard recommendations chat notifications storage advertising payments reviews search admin; do
            echo "Deploying $service..."
            cd $service && railway up --detach && cd ..
          done
